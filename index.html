<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mith's Coffee Bar - สั่งกาแฟกับบาริสต้ามิท</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0b10;
            --panel-bg: rgba(24, 22, 30, 0.95);
            --card-bg: #23202a;
            --accent-color: #d97706;
            --accent-hover: #b45309;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --user-msg: #2563eb;
            --bot-msg: #2e2a38;
            --border-color: #383344;
            --warning-bg: rgba(217, 119, 6, 0.15);
            --warning-border: #d97706;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Prompt', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 20%, rgba(217, 119, 6, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 85% 80%, rgba(120, 53, 15, 0.2) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(15, 14, 19, 0.8) 0%, #0d0b10 100%),
                url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23d97706' fill-opacity='0.03' fill-rule='evenodd'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/svg%3E");
            background-attachment: fixed;
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 12px;
        }

        .chat-container {
            width: 100%;
            max-width: 540px;
            height: 94vh;
            background-color: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.8), 0 0 20px rgba(217, 119, 6, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Cafe Header */
        .chat-header {
            padding: 14px 20px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-avatar-img {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #d97706;
            box-shadow: 0 4px 10px rgba(217, 119, 6, 0.3);
            flex-shrink: 0;
        }

        .header-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #fef3c7;
        }

        .ai-credit {
            font-size: 0.68rem;
            color: var(--text-muted);
            opacity: 0.8;
        }

        .header-subtitle {
            font-size: 0.78rem;
            color: var(--text-muted);
        }

        .settings-btn {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        /* Custom Avatar Settings Panel */
        .avatar-settings-panel {
            display: none;
            background-color: #1a1822;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            gap: 12px;
            font-size: 0.8rem;
        }

        .avatar-settings-panel.active {
            display: flex;
            flex-direction: column;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .setting-item label {
            color: #fef3c7;
        }

        .file-input-wrapper {
            position: relative;
        }

        .file-input-wrapper input[type="file"] {
            display: none;
        }

        .custom-file-btn {
            background-color: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 4px 10px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.75rem;
        }

        .custom-file-btn:hover {
            border-color: var(--accent-color);
        }

        /* Quick Menu Bar */
        .quick-menu {
            padding: 10px 16px;
            background-color: #1c1a24;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            gap: 8px;
            overflow-x: auto;
            white-space: nowrap;
        }

        .quick-menu::-webkit-scrollbar {
            display: none;
        }

        .menu-chip {
            background-color: var(--card-bg);
            color: #fef3c7;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .menu-chip:hover {
            background-color: var(--accent-color);
            color: white;
            border-color: var(--accent-color);
        }

        /* API Key Section */
        .api-key-section {
            padding: 10px 16px;
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border-color);
        }

        .api-input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 4px;
        }

        .api-input-group input {
            flex: 1;
            padding: 8px 12px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
        }

        .api-input-group input:focus {
            border-color: var(--accent-color);
        }

        .api-input-group button {
            padding: 8px 14px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.85rem;
            cursor: pointer;
        }

        .warning-box {
            font-size: 0.72rem;
            color: #fbbf24;
            background-color: var(--warning-bg);
            border-left: 3px solid var(--warning-border);
            padding: 4px 8px;
            border-radius: 4px;
            line-height: 1.3;
        }

        /* Messages Area */
        .chat-messages {
            flex: 1;
            padding: 20px 16px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 16px;
            scroll-behavior: smooth;
        }

        /* Message Layout with Avatar */
        .message-row {
            display: flex;
            gap: 10px;
            max-width: 88%;
        }

        .message-row.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-row.bot {
            align-self: flex-start;
            flex-direction: row;
        }

        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
            flex-shrink: 0;
            margin-top: 2px;
            border: 1px solid var(--border-color);
        }

        .message-content {
            display: flex;
            flex-direction: column;
        }

        .message-row.user .message-content {
            align-items: flex-end;
        }

        .message-row.bot .message-content {
            align-items: flex-start;
        }

        .sender-name {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-bottom: 4px;
            padding: 0 2px;
            font-weight: 500;
        }

        .message-bubble {
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.92rem;
            line-height: 1.5;
            white-space: pre-wrap;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            word-break: break-word;
        }

        .message-row.user .message-bubble {
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            color: #ffffff;
            border-top-right-radius: 4px;
        }

        .message-row.bot .message-bubble {
            background-color: var(--bot-msg);
            color: #f3f4f6;
            border: 1px solid var(--border-color);
            border-top-left-radius: 4px;
        }

        .message-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 4px;
            padding: 0 2px;
        }

        /* Typing Indicator */
        .typing-indicator {
            display: none;
            align-self: flex-start;
            background-color: var(--bot-msg);
            padding: 12px 18px;
            border-radius: 18px;
            border-top-left-radius: 4px;
            margin-bottom: 8px;
            margin-left: 46px;
            border: 1px solid var(--border-color);
        }

        .typing-indicator span {
            height: 8px;
            width: 8px;
            float: left;
            margin: 0 2px;
            background-color: #d97706;
            display: block;
            border-radius: 50%;
            opacity: 0.4;
        }

        .typing-indicator span:nth-of-type(1) { animation: 1s blink infinite 0.33333s; }
        .typing-indicator span:nth-of-type(2) { animation: 1s blink infinite 0.66666s; }
        .typing-indicator span:nth-of-type(3) { animation: 1s blink infinite 0.99999s; }

        @keyframes blink {
            50% { opacity: 1; }
        }

        /* Input Area */
        .chat-input-area {
            padding: 14px 16px;
            background-color: var(--card-bg);
            border-top: 1px solid var(--border-color);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input-area input {
            flex: 1;
            padding: 12px 18px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            color: var(--text-main);
            font-size: 0.95rem;
            outline: none;
        }

        .chat-input-area input:focus {
            border-color: var(--accent-color);
        }

        .send-btn {
            width: 46px;
            height: 46px;
            background-color: var(--accent-color);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: background-color 0.2s;
        }

        .send-btn:hover {
            background-color: var(--accent-hover);
        }

        .send-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
        }
    </style>
</head>
<body>

    <div class="chat-container">
        <!-- Cafe Header -->
        <div class="chat-header">
            <div class="header-left">
                <img id="headerBotImg" class="header-avatar-img" src="" alt="Mith Avatar" />
                <div class="header-info">
                    <div class="header-title">Mith's Coffee Bar</div>
                    <div class="ai-credit">✨ Powered by Gemini AI</div>
                    <div class="header-subtitle">แชตบอตบาริสต้ามิท (อายุ 20)</div>
                </div>
            </div>
            <button class="settings-btn" onclick="toggleAvatarSettings()">🖼️ รูปโปรไฟล์</button>
        </div>

        <!-- Custom Avatar Upload Panel -->
        <div class="avatar-settings-panel" id="avatarSettingsPanel">
            <div class="setting-item">
                <label>🖼️ รูปบาริสต้ามิท (Bot):</label>
                <div class="file-input-wrapper">
                    <button class="custom-file-btn" onclick="document.getElementById('botImgInput').click()">เลือกรูปภาพ</button>
                    <input type="file" id="botImgInput" accept="image/*" onchange="uploadAvatar('bot', this)" />
                </div>
            </div>
            <div class="setting-item">
                <label>👤 รูปโปรไฟล์ของคุณ (User):</label>
                <div class="file-input-wrapper">
                    <button class="custom-file-btn" onclick="document.getElementById('userImgInput').click()">เลือกรูปภาพ</button>
                    <input type="file" id="userImgInput" accept="image/*" onchange="uploadAvatar('user', this)" />
                </div>
            </div>
        </div>

        <!-- Quick Menu Chips -->
        <div class="quick-menu">
            <button class="menu-chip" onclick="quickOrder('แนะนำเมนูหน่อย')">🔥 เมนูแนะนำ</button>
            <button class="menu-chip" onclick="quickOrder('เอากาแฟส้มเย็น 1 แก้ว')">🍊 กาแฟส้ม</button>
            <button class="menu-chip" onclick="quickOrder('ขอเดอร์ตี้เข้มๆ แก้วนึง')">☕ Dirty Coffee</button>
            <button class="menu-chip" onclick="quickOrder('เอาชาเขียวมัทฉะเย็นหวานน้อย')">🍵 มัทฉะเย็น</button>
            <button class="menu-chip" onclick="quickOrder('กี่โมงแล้วเนี่ย ไม่ไปให้อาหารนกแก้วเหรอ?')">🦜 ถามเรื่องนกแก้ว</button>
        </div>

        <!-- API Key Section -->
        <div class="api-key-section">
            <div class="api-input-group">
                <input type="password" id="apiKeyInput" placeholder="กรอก Gemini API Key (ขึ้นต้นด้วย AIzaSy...)" />
                <button id="saveKeyBtn">บันทึก Key</button>
            </div>
            <div class="warning-box">
                ⚠️ โปรเจกต์ฝึกหัด: API Key จะถูกเก็บไว้ใน LocalStorage เบราว์เซอร์ของคุณเท่านั้น
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Typing Indicator -->
        <div class="typing-indicator" id="typingIndicator">
            <span></span>
            <span></span>
            <span></span>
        </div>

        <!-- Input Area -->
        <div class="chat-input-area">
            <input type="text" id="userInput" placeholder="พิมพ์สั่งกาแฟ หรือคุยกับมิท..." onkeypress="handleKeyPress(event)" />
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2,21L23,12L2,3V10L17,12L2,14V21Z" />
                </svg>
            </button>
        </div>
    </div>

    <script>
        // รูปเริ่มต้น SVG Data URI สวยๆ
        const DEFAULT_BOT_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%23d97706'/%3E%3Ctext x='50%' y='55%' font-size='45' text-anchor='middle' dominant-baseline='middle'%3E☕%3C/text%3E%3C/svg%3E";
        const DEFAULT_USER_AVATAR = "data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='50' fill='%232563eb'/%3E%3Ctext x='50%' y='55%' font-size='45' text-anchor='middle' dominant-baseline='middle'%3E👤%3C/text%3E%3C/svg%3E";

        let botAvatarSrc = DEFAULT_BOT_AVATAR;
        let userAvatarSrc = DEFAULT_USER_AVATAR;

        const SYSTEM_PROMPT = `คุณคือ "มิท" (Mith) แชตบอตบาริสต้าประจำร้าน Mith's Coffee Bar วัยรุ่นอายุ 20 ปี

สไตล์การตอบ (Strict Format Rules):
1. ตอบสั้น กระชับ ตรงประเด็น ห้ามพูดพร่ำเพื่อยืดยาว (ไม่เกิน 2-3 บรรทัดต่อคำตอบ เว้นแต่เป็นการแนะนำเมนู)
2. เมื่อมีการแนะนำเมนู ให้ใช้รูปแบบรายการ (Bullet points) สั้นๆ แบ่งหมวดหมู่ให้อ่านง่าย ชัดเจน สบายตา เช่น:
   - ☕ สายเข้ม: อเมริกาโน่ / เอสเปรสโซ
   - 🥛 สายใส่นม: ลาเต้ / คาปูชิโน่ / เดอร์ตี้
   - 🍊 สายสดชื่น: กาแฟส้ม / ยูซุโซดา
3. ห้ามเขียนคำบรรยายฉาก บรรยายท่าทาง หรือวงเล็บใดๆ (เช่น ห้ามมี [ยิ้มกวน], (มองเคาน์เตอร์))

บุคลิก/นิสัย:
- นิสัยกวนๆ ขี้เล่น มีความมั่นใจในตัวเองสูง
- คำติดปาก: ต้องใช้คำว่า "บ่ได้แหม่น" ในบทสนทนาเสมอเมื่อปฏิเสธ แก้ตัว หรือกวนประสาท
- มีความรู้เรื่องเมนูกาแฟเครื่องดื่มดีเยี่ยม
- รัก "นกแก้ว" ที่บ้านมาก ถ้าคุยนานจะเร่งให้รีบสั่งเพราะต้องกลับไปให้อาหารนกแก้ว`;

        let chatHistory = [];

        const apiKeyInput = document.getElementById('apiKeyInput');
        const saveKeyBtn = document.getElementById('saveKeyBtn');
        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const typingIndicator = document.getElementById('typingIndicator');
        const headerBotImg = document.getElementById('headerBotImg');

        window.onload = () => {
            const savedKey = localStorage.getItem('gemini_api_key');
            if (savedKey) {
                apiKeyInput.value = savedKey;
            }

            // โหลดรูป Avatar จาก LocalStorage (ถ้ามี)
            botAvatarSrc = localStorage.getItem('custom_bot_avatar') || DEFAULT_BOT_AVATAR;
            userAvatarSrc = localStorage.getItem('custom_user_avatar') || DEFAULT_USER_AVATAR;
            headerBotImg.src = botAvatarSrc;
            
            appendBotMessage("หวัดดีพี่! รับอะไรดีครับ? บ่ได้แหม่นว่าจะชงมั่วๆ นะ สั่งไวๆ หน่อยเดี๋ยวต้องไปให้อาหารนกแก้วที่บ้านละ");
        };

        function toggleAvatarSettings() {
            const panel = document.getElementById('avatarSettingsPanel');
            panel.classList.toggle('active');
        }

        function uploadAvatar(type, input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const base64Img = e.target.result;
                if (type === 'bot') {
                    botAvatarSrc = base64Img;
                    localStorage.setItem('custom_bot_avatar', base64Img);
                    headerBotImg.src = base64Img;
                    // อัปเดตรูปของบอททั้งหมดในหน้า
                    document.querySelectorAll('.msg-avatar.bot-img').forEach(img => img.src = base64Img);
                } else {
                    userAvatarSrc = base64Img;
                    localStorage.setItem('custom_user_avatar', base64Img);
                    // อัปเดตรูปของยูสเซอร์ทั้งหมดในหน้า
                    document.querySelectorAll('.msg-avatar.user-img').forEach(img => img.src = base64Img);
                }
            };
            reader.readAsDataURL(file);
        }

        saveKeyBtn.addEventListener('click', () => {
            const key = apiKeyInput.value.trim();
            if (key) {
                localStorage.setItem('gemini_api_key', key);
                alert('บันทึก API Key เรียบร้อยแล้ว!');
            } else {
                localStorage.removeItem('gemini_api_key');
                alert('ลบ API Key เรียบร้อยแล้ว');
            }
        });

        function handleKeyPress(e) {
            if (e.key === 'Enter') {
                sendMessage();
            }
        }

        function quickOrder(text) {
            userInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            const apiKey = localStorage.getItem('gemini_api_key') || apiKeyInput.value.trim();
            if (!apiKey) {
                alert('กรุณากรอกและบันทึก Gemini API Key ก่อนเริ่มคุยนะครับ!');
                return;
            }

            appendUserMessage(text);
            userInput.value = '';

            chatHistory.push({
                role: 'user',
                parts: [{ text: text }]
            });

            showTyping(true);

            try {
                const response = await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-goog-api-key': apiKey
                    },
                    body: JSON.stringify({
                        system_instruction: {
                            parts: [{ text: SYSTEM_PROMPT }]
                        },
                        contents: chatHistory
                    })
                });

                const data = await response.json();
                showTyping(false);

                if (data.error) {
                    appendBotMessage(`เกิดข้อผิดพลาดจาก API: ${data.error.message || 'โปรดตรวจสอบ API Key'}`);
                    chatHistory.pop();
                    return;
                }

                if (data.candidates && data.candidates[0].content) {
                    const botReply = data.candidates[0].content.parts[0].text;
                    appendBotMessage(botReply);
                    chatHistory.push({
                        role: 'model',
                        parts: [{ text: botReply }]
                    });
                } else {
                    appendBotMessage('เอ๊ะ... เหมือนระบบจะมีปัญหา ลองพิมพ์ใหม่อีกทีซิพี่!');
                    chatHistory.pop();
                }

            } catch (error) {
                showTyping(false);
                console.error('Error:', error);
                appendBotMessage('บอร์ดเชื่อมต่อมีปัญหาซะงั้น! ลองเช็กอินเทอร์เน็ตหรือ API Key ดูใหม่นะพี่');
                chatHistory.pop();
            }
        }

        function appendUserMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row user';

            const img = document.createElement('img');
            img.className = 'msg-avatar user-img';
            img.src = userAvatarSrc;

            const content = document.createElement('div');
            content.className = 'message-content';
            
            const sender = document.createElement('div');
            sender.className = 'sender-name';
            sender.textContent = 'คุณ';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = getCurrentTime();

            content.appendChild(sender);
            content.appendChild(bubble);
            content.appendChild(time);
            
            row.appendChild(img);
            row.appendChild(content);

            chatMessages.appendChild(row);
            scrollToBottom();
        }

        function appendBotMessage(text) {
            const row = document.createElement('div');
            row.className = 'message-row bot';

            const img = document.createElement('img');
            img.className = 'msg-avatar bot-img';
            img.src = botAvatarSrc;

            const content = document.createElement('div');
            content.className = 'message-content';

            const sender = document.createElement('div');
            sender.className = 'sender-name';
            sender.textContent = 'มิท (บาริสต้า)';

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            
            const time = document.createElement('div');
            time.className = 'message-time';
            time.textContent = getCurrentTime();

            content.appendChild(sender);
            content.appendChild(bubble);
            content.appendChild(time);

            row.appendChild(img);
            row.appendChild(content);

            chatMessages.appendChild(row);
            scrollToBottom();
        }

        function showTyping(show) {
            typingIndicator.style.display = show ? 'block' : 'none';
            scrollToBottom();
        }

        function scrollToBottom() {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            return now.toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
